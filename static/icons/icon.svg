<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#18181b"/>
  <!-- Graph topology — the "wire" metaphor: nodes connected through a central hub -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#10b77f" stroke-width="14" stroke-opacity="0.15"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#10b77f" stroke-width="6"/>
  <!-- Internal connections -->
  <line x1="120" y1="180" x2="170" y2="300" stroke="#10b77f" stroke-width="18" stroke-linecap="round"/>
  <line x1="392" y1="180" x2="342" y2="300" stroke="#10b77f" stroke-width="18" stroke-linecap="round"/>
  <line x1="256" y1="230" x2="170" y2="300" stroke="#10b77f" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="230" x2="342" y2="300" stroke="#10b77f" stroke-width="10" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="120" cy="180" r="20" fill="#34d399"/>
  <circle cx="170" cy="300" r="20" fill="#34d399"/>
  <circle cx="392" cy="180" r="20" fill="#34d399"/>
  <circle cx="342" cy="300" r="20" fill="#34d399"/>
  <!-- Central hub -->
  <circle cx="256" cy="230" r="32" fill="#6ee7b7"/>
</svg>
